<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Placeholder: editor with context sidebar">
  <rect width="1600" height="1000" fill="#282726"/>

  <!-- editor pane -->
  <rect x="60" y="60" width="1000" height="880" rx="12" fill="#1c1b1a" stroke="#403e3a" stroke-width="1"/>

  <!-- title bar -->
  <rect x="100" y="120" width="500" height="34" rx="4" fill="#878580"/>

  <!-- body paragraph lines -->
  <g fill="#403e3a">
    <rect x="100" y="200" width="900" height="14" rx="3"/>
    <rect x="100" y="226" width="880" height="14" rx="3"/>
    <rect x="100" y="252" width="700" height="14" rx="3"/>
    <rect x="100" y="298" width="900" height="14" rx="3"/>
    <rect x="100" y="324" width="820" height="14" rx="3"/>
    <rect x="100" y="350" width="900" height="14" rx="3"/>
    <rect x="100" y="376" width="600" height="14" rx="3"/>
  </g>

  <!-- in-progress paragraph (accent) -->
  <g fill="#bc5215" opacity="0.9">
    <rect x="100" y="430" width="900" height="14" rx="3"/>
    <rect x="100" y="456" width="880" height="14" rx="3"/>
    <rect x="100" y="482" width="450" height="14" rx="3"/>
  </g>

  <!-- caret -->
  <rect x="555" y="478" width="3" height="22" fill="#fffcf0"/>

  <!-- tail paragraph -->
  <g fill="#403e3a">
    <rect x="100" y="540" width="900" height="14" rx="3"/>
    <rect x="100" y="566" width="880" height="14" rx="3"/>
    <rect x="100" y="592" width="780" height="14" rx="3"/>
  </g>

  <!-- sidebar -->
  <rect x="1080" y="60" width="460" height="880" rx="12" fill="#1c1b1a" stroke="#403e3a" stroke-width="1"/>

  <text x="1110" y="118" fill="#b7b5ac" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">Context</text>

  <!-- context cards -->
  <g>
    <rect x="1110" y="150" width="400" height="125" rx="6" fill="#282726" stroke="#403e3a"/>
    <rect x="1130" y="172" width="200" height="12" rx="2" fill="#b7b5ac"/>
    <rect x="1130" y="200" width="320" height="10" rx="2" fill="#6f6e69"/>
    <rect x="1130" y="220" width="300" height="10" rx="2" fill="#6f6e69"/>
    <rect x="1130" y="240" width="250" height="10" rx="2" fill="#6f6e69"/>

    <rect x="1110" y="295" width="400" height="125" rx="6" fill="#282726" stroke="#403e3a"/>
    <rect x="1130" y="317" width="180" height="12" rx="2" fill="#b7b5ac"/>
    <rect x="1130" y="345" width="320" height="10" rx="2" fill="#6f6e69"/>
    <rect x="1130" y="365" width="280" height="10" rx="2" fill="#6f6e69"/>

    <rect x="1110" y="440" width="400" height="125" rx="6" fill="#282726" stroke="#403e3a"/>
    <rect x="1130" y="462" width="220" height="12" rx="2" fill="#b7b5ac"/>
    <rect x="1130" y="490" width="320" height="10" rx="2" fill="#6f6e69"/>
    <rect x="1130" y="510" width="280" height="10" rx="2" fill="#6f6e69"/>
    <rect x="1130" y="530" width="250" height="10" rx="2" fill="#6f6e69"/>
  </g>

  <text x="800" y="985" fill="#6f6e69" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" text-anchor="middle">placeholder · editor with context sidebar</text>
</svg>
